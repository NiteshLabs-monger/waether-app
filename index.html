<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <link rel="stylesheet" href="style.css" />
    <title>weatherForecast</title>
  </head>
  <body id="body">
    <div class="contain">
      <div id="sun">
        <div id="container2"></div>
        <div id="temp" class="embed"></div>
      </div>
      <div class="container">
        <div class="search">
          <input
            id="input1"
            type="text"
            placeholder="city-Name"
            spellcheck="true"
          />
          <button id="btn"></button>
        </div>
        <div class="content-container">
          <div class="city-name">
            <p id="city-name" style="font-size: 2rem">Rajasthan</p>
          </div>
          <div class="inner-content">
            <div class="box-aqi">
              <div class="aqi">AQI</div>
              <svg class="aqi-gauge" viewBox="0 0 200 200">
                <!-- Background ring -->
                <circle
                  class="gauge-background"
                  
                />

                <!-- Progress ring -->
                <circle
                  id="gaugeProgress"
                  
                  
                  
                  
                />
                <text  id='aqi-value' x="70" y="100" fill="red" font-size="40">365</text>
              </svg>
              <div class="aqi-condition">MODERATE</div>
            </div>

            <div
              class="daylight-ring"
              
            >
              <svg class="ring-bg" viewBox="0 0 120 120">
                <circle  class="ring-track" />
                <circle
                  
                  class="ring-daylight"
                  
                />
              </svg>
           
              <div class="bubble sunrise-bubble" >
                <span class="bubble-time">06:12</span>
                <span class="bubble-label">Sunrise</span>
              </div>
              <div class="bubble sunset-bubble">
                <span class="bubble-time">17:42</span>
                <span class="bubble-label">Sunset</span>
              </div>
            </div>
            <div class="additionally">
              <div class="humidity">
                <div class="humid-val"></div>
                <div class="humid-title">Humidity</div>
              </div>
              <div class="cloudiness">
                <div class="cloud-val"></div>
                <div class="cloud-title">cloudiness</div>
              </div>
              <table id="param-table">
                <tr id="pressure">
                  <td>pressure</td>
                  <td></td>
                </tr>
                <tr id="wind-speed">
                  <td>wind speed</td>
                  <td></td>
                </tr>
                <tr id="wind-direction">
                  <td >wind direction</td>
                  <td></td>
                </tr>
                <tr id="visibility">
                  <td>visibility</td>
                  <td></td>
                </tr>
              </table>
            </div>
            <!-- <div class="thermo-max">
              <div id="tube">
              </div>
              <div id="bulb">
                <p class="max-temp">54</p>
              </div>
            </div>
            <div class="thermo-min">
              <div id="tube-min">
              </div>
              <div id="bulb-min">
                <p class="min-temp">54</p>
              </div>
            </div> -->
            
          </div>
        </div>
      </div>
    </div>
    
    
  </body>
</html>
